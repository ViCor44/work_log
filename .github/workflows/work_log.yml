name: work_log CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: PHP version
        run: php -v

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: PHP lint
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.php |
            Where-Object { $_.FullName -notmatch '\\vendor\\' } |
            ForEach-Object {
              php -l $_.FullName
            }

      - name: Skip PHPStan
        run: echo "PHPStan disabled"

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: ci
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          cd C:\xampp\htdocs\work_log

          git fetch --all --prune
          if ($LASTEXITCODE -ne 0) { throw 'git fetch failed' }

          git checkout main
          if ($LASTEXITCODE -ne 0) { throw 'git checkout main failed' }

          git pull --ff-only origin main
          if ($LASTEXITCODE -ne 0) { throw 'git pull --ff-only failed' }

          composer install --no-interaction --prefer-dist --no-dev
          if ($LASTEXITCODE -ne 0) { throw 'composer install failed' }

      - name: Verify deployed commit
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          cd C:\xampp\htdocs\work_log

          git fetch origin main --prune
          if ($LASTEXITCODE -ne 0) { throw 'git fetch origin main failed during verification' }

          $deployed = (git rev-parse HEAD).Trim()
          $expected = "$env:GITHUB_SHA".Trim()
          Write-Host "Expected commit: $expected"
          Write-Host "Deployed commit: $deployed"

          git merge-base --is-ancestor $expected $deployed
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Deploy mismatch: deployed commit does not contain the workflow commit."
            exit 1
          }

      - name: PHP lint (server)
        shell: powershell
        run: |
          cd C:/xampp/htdocs/work_log
          Get-ChildItem -Recurse -Filter *.php |
            Where-Object { $_.FullName -notmatch '\\vendor\\' } |
            ForEach-Object {
              php -l $_.FullName
            }
