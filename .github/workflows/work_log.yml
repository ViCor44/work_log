name: work_log CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: PHP version
        run: php -v

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: PHP lint
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.php |
            Where-Object { $_.FullName -notmatch '\\vendor\\' } |
            ForEach-Object {
              php -l $_.FullName
            }

      - name: Skip PHPStan
        run: echo "PHPStan disabled"

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: ci
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        shell: powershell
        run: |
          cd C:\xampp\htdocs\work_log
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          composer install --no-interaction --prefer-dist --no-dev

      - name: PHP lint (server)
        shell: powershell
        run: |
          cd C:/xampp/htdocs/work_log
          Get-ChildItem -Recurse -Filter *.php |
            Where-Object { $_.FullName -notmatch '\\vendor\\' } |
            ForEach-Object {
              php -l $_.FullName
            }
